<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Overwatch</title>

    <!-- Bootstrap to help with buttons and layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main CSS file -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="auth-page">

    <header class="navbar-auth">
        <nav class="nav-links">
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main class="auth-container">
        <section class="auth-wrapper">

            <div class="auth-left">
                <div class="brand">
                    <span class="brand-icon"></span>
                    <span>Overwatch</span>
                </div>

                <h1>Enter the world of heroes</h1>
                <p>
                    Log in to your account and keep exploring the Overwatch heroes.
                </p>
            </div>

            <div class="auth-right">
                <h2>Welcome back</h2>
                <p class="subtitle">Log in to continue</p>

                <div id="msg-erro" class="msg-feedback msg-erro"></div>
                <div id="msg-sucesso" class="msg-feedback msg-sucesso"></div>

                <form id="form-login">
                    <div class="campo">
                        <label for="login">Username</label>
                        <input type="text" id="login" placeholder="Enter your username">
                    </div>

                    <div class="campo">
                        <label for="senha">Password</label>

                        <div class="input-senha">
                            <input type="password" id="senha" placeholder="Enter your password">

                            <button type="button" onclick="toggleSenha('senha', this)">
                                👁
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth" id="btn-login">
                        Log In →
                    </button>
                </form>

                <p class="switch-link">
                    Don't have an account?
                    <a href="sign-up.html">Create account</a>
                </p>
            </div>

        </section>
    </main>

    <script src="assets/scripts/auth.js"></script>
</body>

</html>
