<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Overwatch</title>

    <!-- Bootstrap to help with some styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main CSS file -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="auth-page">

    <header class="navbar-auth">

        <nav class="nav-links">
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main class="auth-container">
        <section class="auth-wrapper cadastro-wrapper">

            <div class="auth-left">
                <h1>Create your account</h1>
                <p>
                    Choose your hero avatar and create your profile to access the website.
                </p>
            </div>

            <div class="auth-right">
                <h2>Sign up</h2>
                <p class="subtitle">Fill in the information below</p>

                <div id="msg-erro" class="msg-feedback msg-erro"></div>
                <div id="msg-sucesso" class="msg-feedback msg-sucesso"></div>

                <form id="form-cadastro">
                    <div class="campo">
                        <label for="nome">Name</label>
                        <input type="text" id="nome" placeholder="Enter your name">
                    </div>

                    <div class="campo">
                        <label for="login">Username</label>
                        <input type="text" id="login" placeholder="Create a username">
                    </div>

                    <div class="campo">
                        <label for="senha">Password</label>

                        <div class="input-senha">
                            <input type="password" id="senha" placeholder="Create a password">

                            <button type="button" onclick="toggleSenha('senha', this)">
                                👁
                            </button>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="confirmar-senha">Confirm password</label>

                        <div class="input-senha">
                            <input type="password" id="confirmar-senha" placeholder="Repeat your password">

                            <button type="button" onclick="toggleSenha('confirmar-senha', this)">
                                👁
                            </button>
                        </div>
                    </div>

                    <div class="campo">
                        <label>Choose your profile picture</label>

                        <div id="lista-avatares" class="lista-avatares">
                            <p class="carregando-avatares">Loading heroes...</p>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth" id="btn-cadastro">
                        Create account →
                    </button>
                </form>

                <p class="switch-link">
                    Already have an account?
                    <a href="login.html">Log in</a>
                </p>
            </div>

        </section>
    </main>

    <script src="assets/scripts/auth.js"></script>
</body>

</html>
